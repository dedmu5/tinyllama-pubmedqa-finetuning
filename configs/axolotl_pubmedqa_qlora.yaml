# Example Axolotl config for the PubMedQA QLoRA experiments.
# Update `base_model`, `datasets.path` and `output_dir` before launching training.

base_model: TinyLlama/TinyLlama-1.1B-Chat-v0.1
model_type: LlamaForCausalLM
tokenizer_type: LlamaTokenizer

load_in_8bit: false
load_in_4bit: true
strict: false

datasets:
  - path: data/processed/pubmedqa_instruction_qa.jsonl
    type: alpaca
dataset_prepared_path:
val_set_size: 0.05
output_dir: outputs/pubmedqa-qlora

adapter: qlora
lora_model_dir:
sequence_len: 4096
sample_packing: false
eval_sample_packing: false
pad_to_sequence_len: false

lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_linear: true

gradient_accumulation_steps: 4
micro_batch_size: 8
num_epochs: 4
optimizer: paged_adamw_32bit
lr_scheduler: cosine
learning_rate: 0.0002

train_on_inputs: false
group_by_length: false
bf16: false
fp16: true
tf32: false
